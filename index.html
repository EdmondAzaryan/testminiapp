<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 Telegram Game</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #faf8ef;
            color: #776e65;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        .header {
            width: 320px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .score-container {
            display: flex;
            gap: 10px;
        }
        .score-box {
            background: #bbada0;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            min-width: 60px;
        }
        .score-box span {
            display: block;
            font-size: 18px;
        }
        #game-container {
            width: 320px;
            height: 320px;
            background-color: #bbada0;
            border-radius: 6px;
            position: relative;
            padding: 8px;
            box-sizing: border-box;
        }
        .grid-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .grid-row:last-child { margin-bottom: 0; }
        .grid-cell {
            width: 68px;
            height: 68px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 4px;
        }
        .tile {
            width: 68px;
            height: 68px;
            border-radius: 4px;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: bold;
            transition: all 0.08s ease;
        }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 22px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 22px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 22px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 18px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">2048</h2>
        <div class="score-container">
            <div class="score-box">СЧЕТ<span id="score">0</span></div>
            <div class="score-box">РЕКОРД<span id="best-score">0</span></div>
        </div>
    </div>

    <div id="game-container">
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div id="tiles-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        if(tg.expand) tg.expand();

        let board = Array(4).fill().map(() => Array(4).fill(0));
        let score = 0;
        let bestScore = 0;

        // Загрузка рекорда из CloudStorage Telegram
        if (tg.CloudStorage) {
            tg.CloudStorage.getItem('best_score_2048', (err, value) => {
                if (!err && value) {
                    bestScore = parseInt(value, 10);
                    document.getElementById('best-score').innerText = bestScore;
                }
            });
        }

        function initGame() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            document.getElementById('score').innerText = 0;
            addTile();
            addTile();
            drawBoard();
        }

        function addTile() {
            let emptyCells = [];
            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    if(board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if(emptyCells.length > 0) {
                let cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function drawBoard() {
            const container = document.getElementById('tiles-container');
            container.innerHTML = '';
            for(let r=0; r<4; r++) {
                for(let c=0; c<4; c++) {
                    if(board[r][c] !== 0) {
                        let tile = document.createElement('div');
                        tile.className = `tile tile-${board[r][c]}`;
                        tile.innerText = board[r][c];
                        tile.style.top = `${8 + r * 76}px`;
                        tile.style.left = `${8 + c * 76}px`;
                        container.appendChild(tile);
                    }
                }
            }
        }

        function updateScore(amount) {
            score += amount;
            document.getElementById('score').innerText = score;
            if (score > bestScore) {
                bestScore = score;
                document.getElementById('best-score').innerText = bestScore;
                if (tg.CloudStorage) {
                    tg.CloudStorage.setItem('best_score_2048', String(bestScore));
                }
            }
        }

        function slide(row) {
            let arr = row.filter(val => val);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    updateScore(arr[i]);
                    arr[i + 1] = 0;
                }
            }
            arr = arr.filter(val => val);
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function move(direction) {
            let oldBoard = JSON.stringify(board);

            if (direction === 'left' || direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    let row = board[i];
                    if (direction === 'right') row.reverse();
                    let newRow = slide(row);
                    if (direction === 'right') newRow.reverse();
                    board[i] = newRow;
                }
            } else if (direction === 'up' || direction === 'down') {
                for (let c = 0; c < 4; c++) {
                    let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    if (direction === 'down') col.reverse();
                    let newCol = slide(col);
                    if (direction === 'down') newCol.reverse();
                    for (let r = 0; r < 4; r++) {
                        board[r][c] = newCol[r];
                    }
                }
            }

            if (oldBoard !== JSON.stringify(board)) {
                addTile();
                drawBoard();
                checkGameOver();
            }
        }

        function checkGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) return;
                    if (r < 3 && board[r][c] === board[r + 1][c]) return;
                    if (c < 3 && board[r][c] === board[r][c + 1]) return;
                }
            }
            if(tg.showAlert) tg.showAlert(`Игра окончена! Счет: ${score}`);
            else alert(`Игра окончена! Счет: ${score}`);
            initGame();
        }

        let touchStart = null;
        window.addEventListener('touchstart', e => {
            touchStart = { x: e.touches.clientX, y: e.touches.clientY };
        });
        window.addEventListener('touchend', e => {
            if (!touchStart) return;
            let dx = e.changedTouches.clientX - touchStart.x;
            let dy = e.changedTouches.clientY - touchStart.y;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left');
            } else {
                if (Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up');
            }
            touchStart = null;
        });

        initGame();
    </script>
</body>
</html>
